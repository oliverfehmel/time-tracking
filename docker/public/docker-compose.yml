services:
    db:
        image: mariadb:11
        container_name: time_tracking_db
        restart: unless-stopped
        environment:
            TZ: Europe/Berlin
            MARIADB_DATABASE: time_tracking_db
            MARIADB_USER: time_tracking_db
            MARIADB_PASSWORD: time_tracking_db
            MARIADB_ROOT_PASSWORD: time_tracking_db
        ports:
            - "127.0.0.1:3306:3306"
        volumes:
            - database:/var/lib/mysql
        command:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci

volumes:
    database:
